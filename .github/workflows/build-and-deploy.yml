name: Build and Deploy CMS Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
        run: pnpm build

  build_and_push:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          tags: |
            lenishmagar/tenant-flow-cms-frontend:latest
            lenishmagar/tenant-flow-cms-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    permissions:
      contents: read
    steps:
      - name: Deploy container to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_IMAGE: lenishmagar/tenant-flow-cms-frontend:latest
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          APP_URL: ${{ vars.APP_URL || 'https://cmsdashboard.devfy.codes' }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
          envs: FRONTEND_IMAGE,NEXT_PUBLIC_API_URL,APP_URL,DOCKER_USERNAME,DOCKER_TOKEN
          script: |
            set -euo pipefail

            APP_DIR="/home/lenish/cms"
            DOCKER_NETWORK="luxstore-network"
            NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:4000}"
            APP_URL="${APP_URL:-https://cmsdashboard.devfy.codes}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Ensure Docker can pull the image during deploy.
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin

            docker pull "$FRONTEND_IMAGE"
            docker rm -f cms_frontend || true
            docker run -d \
              --name cms_frontend \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK" \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
              -e APP_URL="$APP_URL" \
              -p "3004:3000" \
              "$FRONTEND_IMAGE"
